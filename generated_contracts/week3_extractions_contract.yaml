kind: DataContract
apiVersion: v3.0.0
id: week3-extractions-contract
info:
  title: Week 3 Document Refinery - Extraction Records
  version: 1.0.0
  owner: extraction-team
  description: Contract for extraction data with confidence validation
  tags:
  - extraction
  - nlp
  - critical
compatibility: backward
schema:
  doc_id:
    type: string
    format: uuid
    required: true
    unique: true
  extracted_facts:
    type: array
    minItems: 1
    required: true
    items:
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
        required: true
        description: Confidence score MUST be in [0.0, 1.0] - BREAKING if changed
quality:
  type: SodaChecks
  specification:
    checks:
    - confidence_range:
        condition: confidence BETWEEN 0.0 AND 1.0
        severity: CRITICAL
    - confidence_type:
        condition: typeof(confidence) = 'float'
        severity: CRITICAL
    - confidence_not_null:
        condition: confidence IS NOT NULL
        severity: CRITICAL
    - doc_id_not_null:
        condition: doc_id IS NOT NULL
        severity: CRITICAL
    - doc_id_unique:
        condition: COUNT(DISTINCT doc_id) = COUNT(*)
        severity: CRITICAL
    - min_confidence:
        condition: MIN(confidence) >= 0.0
        severity: HIGH
    - max_confidence:
        condition: MAX(confidence) <= 1.0
        severity: HIGH
    - row_count:
        condition: COUNT(*) >= 5
        severity: MEDIUM
lineage:
  downstream:
  - id: week4-cartographer
    fields_consumed:
    - confidence
    - doc_id
  - id: week5-event-sourcing
    fields_consumed:
    - doc_id
statistics:
  total_records: 10
  confidence_range:
    min: 0.67
    max: 95
    has_violation: true
