kind: DataContract
apiVersion: v3.0.0
id: extraction_ledger-contract
info:
  title: WEEK3 Data Contract
  version: 1.0.0
  owner: data-team
  description: Auto-generated contract for week3 data
servers:
  local:
    type: local
    path: outputs\week3\extractions.jsonl
    format: jsonl
schema:
  confidence:
    type: number
    minimum: 0.0
    maximum: 1.0
    required: true
    description: Confidence score MUST be between 0.0 and 1.0 (float, not integer
      percentage)
quality:
  type: SodaChecks
  specification:
    checks:
    - confidence_range:
        condition: confidence BETWEEN 0.0 AND 1.0
        severity: CRITICAL
        description: Confidence must be in [0.0, 1.0] range
    - confidence_type:
        condition: typeof(confidence) = 'float'
        severity: CRITICAL
        description: Confidence must be float, not integer
    - row_count:
        condition: COUNT(*) >= 50
        severity: MEDIUM
        description: At least 50 records required
    - statistical_warning:
        condition: mean_confidence BETWEEN 0.3 AND 0.9
        severity: HIGH
        description: 'Values outside [0.0, 1.0]: min=0.41, max=92.00'
lineage:
  upstream:
  - id: source-data
    description: C:\Users\hp\Music\Document_intelligence_refine\.refinery\extraction_ledger.jsonl
  downstream:
  - id: validation-system
    description: Contract validation system
    fields_consumed:
    - confidence
